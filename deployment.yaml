apiVersion: apps/v1

kind: Deployment

metadata:

  name: networksource

spec:

  replicas: 2

  selector:

    matchLabels:

      app: networksource

  template:

    metadata:

      labels:

        app: networksource

    spec:

      containers:

      - name: networksource

        image: madhu58/networksource:latest

        ports:

        - containerPort: 8083